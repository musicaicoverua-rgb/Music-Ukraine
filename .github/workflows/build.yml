        class HomeTab extends StatefulWidget {
          const HomeTab({super.key});
          @override State<HomeTab> createState() => _HomeTabState();
        }

        class _HomeTabState extends State<HomeTab> {
          final _supabase = SupabaseService();
          List<TrackModel> _tracks = [];
          bool _loading = true;

          @override void initState() {
            super.initState();
            _safeLoad();
          }

          Future<void> _safeLoad() async {
            if (!mounted) return;
            setState(() => _loading = true);
            try {
              final tracks = await _supabase.getTracks();
              if (mounted) setState(() { _tracks = tracks; _loading = false; });
            } catch (e) {
              if (mounted) setState(() => _loading = false);
            }
          }

          @override Widget build(BuildContext context) {
            return RefreshIndicator(
              onRefresh: _safeLoad,
              child: CustomScrollView(
                slivers: [
                  const SliverAppBar(floating: true, backgroundColor: Colors.black, title: Text('OpenWave', style: TextStyle(fontWeight: FontWeight.bold, color: Colors.white))),
                  if (_loading) const SliverFillRemaining(child: Center(child: CircularProgressIndicator(color: Color(0xFF6C63FF))))
                  else if (_tracks.isEmpty) const SliverFillRemaining(child: Center(child: Text('Пісень ще немає. Завантажте першу!', style: TextStyle(color: Colors.white))))
                  else SliverPadding(
                    padding: const EdgeInsets.all(16),
                    sliver: SliverList(
                      delegate: SliverChildBuilderDelegate((context, index) {
                        final track = _tracks[index];
                        return Container(
                          margin: const EdgeInsets.only(bottom: 12),
