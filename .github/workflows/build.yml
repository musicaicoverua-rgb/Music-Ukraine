              return f"(delete({t})..where((tbl) => {c.replace(t+'.', 'tbl.')})).go();"
          for r, d, fs in os.walk('lib'):
              for f in fs:
                  if not f.endswith('.dart'): continue
                  p_path = os.path.join(r, f)
                  with open(p_path, 'r', encoding='utf-8') as file: txt = file.read()
                  orig = txt
                  txt = txt.replace("json['isAdmin']", "json['is_admin']")
                  txt = txt.replace("DatabaseConnection _openConnection()", "QueryExecutor _openConnection()")
                  txt = txt.replace("DatabaseConnection openConnection()", "QueryExecutor openConnection()")
                  txt = re.sub(r'delete\(([a-zA-Z0-9_]+)\)\.delete\((.*?)\);', rep, txt, flags=re.DOTALL)
                  txt = re.sub(r'native:\s*(?:const\s+)?DriftNativeOptions\s*\(.*?\)\s*,?', '', txt, flags=re.DOTALL)
                  txt = re.sub(r'query\s*=\s*query\.eq\([^)]+\);', '', txt)
                  txt = re.sub(r'query\s*=\s*query\.or\([^)]+\);', '', txt)
                  txt = re.sub(r'\.or\([^\)]+\)', '', txt)
                  if orig != txt:
                      with open(p_path, 'w', encoding='utf-8') as file: file.write(txt)
          EOF
