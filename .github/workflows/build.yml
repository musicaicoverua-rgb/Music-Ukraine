name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: STEP 1 - Unpack Project
        run: |
          unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
          DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          echo "FLUTTER_DIR=$DIR" >> $GITHUB_ENV

      - name: STEP 2 - Safe Dependencies Update
        run: |
          cd "${{ env.FLUTTER_DIR }}"
          flutter pub add just_audio
          flutter pub add just_audio_background
          flutter pub add supabase_flutter
          
          cat << 'EOF' >> pubspec.yaml
          
          dependency_overrides:
            web: ^0.5.0
            intl: ^0.19.0
          EOF
