          cat << 'EOF' > lib/features/home/presentation/screens/main_screen.dart
          import 'package:flutter/material.dart'; import 'package:openwave/core/services/simple_audio_service.dart'; import 'package:openwave/core/models/track_model.dart'; import 'package:openwave/features/player/presentation/screens/full_player_screen.dart'; import 'home_tab.dart'; import 'profile_tab.dart';
