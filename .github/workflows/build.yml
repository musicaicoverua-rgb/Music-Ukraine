n Card(color: const Color(0xFF1E1E2C), margin: const EdgeInsets.only(bottom: 12), child: ListTile(leading: Icon(i, color: col), title: Text(t, style: const TextStyle(color: Colors.white)), trailing: const Icon(Icons.arrow_forward_ios, color: Colors.grey, size: 16), onTap: () => Navigator.push(c, MaterialPageRoute(builder: (_) => d)))); } }""")
