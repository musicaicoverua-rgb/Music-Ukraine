name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Flutter (Stable 3.22.0)
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: STEP 1 - Unpack Project
      run: |
        unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
        FLUTTER_DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
        echo "FLUTTER_DIR=$FLUTTER_DIR" >> $GITHUB_ENV

    - name: STEP 2 - Dependencies Fix
      run: |
        cd ${{ env.FLUTTER_DIR }}
        if ! grep -q "just_audio:" pubspec.yaml; then
          sed -i '/dependencies:/a \  just_audio: ^0.9.36' pubspec.yaml
        fi
        if ! grep -q "just_audio_background:" pubspec.yaml; then
          sed -i '/dependencies:/a \  just_audio_background: ^0.0.1-beta.13' pubspec.yaml
        fi
        cat << 'EOF' >> pubspec.yaml
        dependency_overrides:
          web: ^0.5.0
          intl: ^0.19.0
        EOF
    - name: STEP 3 - Android Config
      run: |
        cd ${{ env.FLUTTER_DIR }}
        mkdir -p android
        echo "kotlin_version=1.9.0" >> android/gradle.properties
        echo "android.useAndroidX=true" >> android/gradle.properties
        echo "android.enableJetifier=true" >> android/gradle.properties
        echo "org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G" >> android/gradle.properties
        echo "flutter.compileSdkVersion=35" >> android/local.properties
        echo "flutter.minSdkVersion=24" >> android/local.properties
        echo "flutter.targetSdkVersion=35" >> android/local.properties
        
        if [ -f "android/app/build.gradle" ]; then
          sed -i -E 's/compileSdkVersion [0-9]+/compileSdkVersion 35/g' android/app/build.gradle || true
          sed -i -E 's/compileSdk [0-9]+/compileSdk 35/g' android/app/build.gradle || true
          sed -i -E 's/targetSdkVersion [0-9]+/targetSdkVersion 35/g' android/app/build.gradle || true
          sed -i -E 's/targetSdk [0-9]+/targetSdk 35/g' android/app/build.gradle || true
          sed -i -E 's/minSdkVersion [0-9]+/minSdkVersion 24/g' android/app/build.gradle || true
        fi

    - name: STEP 4 - Android Permissions & Assets
      run: |
        cd ${{ env.FLUTTER_DIR }}
        mkdir -p assets/images assets/animations assets/icons assets/fonts assets/translations assets/langs
        touch assets/images/logo.png assets/images/default_cover.png
        echo "{}" > assets/animations/loading.json
        echo "{}" > assets/animations/success.json
        echo "{}" > assets/animations/confetti.json
        touch assets/fonts/Inter-Regular.ttf assets/fonts/Inter-Medium.ttf assets/fonts/Inter-SemiBold.ttf assets/fonts/Inter-Bold.ttf
        for lang in uk en es ru de fr pl cs; do echo "{}" > assets/translations/$lang.json; echo "{}" > assets/langs/$lang.json; done
        
        # Base64 encoded Python script to safely patch AndroidManifest.xml
        echo "" | base64 -d > fix_manifest.py
        python3 fix_manifest.py

    - name: STEP 5 - Native UI Setup
      run: |
        cd ${{ env.FLUTTER_DIR }}
        RES_DIR="android/app/src/main/res"
        mkdir -p $RES_DIR/mipmap-xxhdpi $RES_DIR/values
        echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" | base64 -d > $RES_DIR/mipmap-xxhdpi/ic_launcher.png
        cp $RES_DIR/mipmap-xxhdpi/ic_launcher.png $RES_DIR/mipmap-xxhdpi/ic_launcher_round.png
        # Base64 encoded styles.xml
        echo "" | base64 -d > $RES_DIR/values/styles.xml
            - name: STEP 6 - Code Doctor (Safe Fixes)
      run: |
        cd ${{ env.FLUTTER_DIR }}
        # Base64 encoded fix_app.py
        echo "" | base64 -d > fix_app.py
        python3 fix_app.py

    - name: STEP 7 - Generate Features (Base64)
      run: |
        cd ${{ env.FLUTTER_DIR }}
        mkdir -p lib/features/gamification/presentation/screens
        mkdir -p lib/features/radio/presentation/screens
        mkdir -p lib/features/chat/presentation/screens
        
        # Daily Reward
        echo "" | base64 -d > lib/features/gamification/presentation/screens/daily_reward_screen.dart
        
        # Spin Wheel
        echo "" | base64 -d > lib/features/gamification/presentation/screens/spin_wheel_screen.dart

        # Achievements
        echo "" | base64 -d > lib/features/gamification/presentation/screens/achievements_screen.dart

        # Radio
        echo "" | base64 -d > lib/features/radio/presentation/screens/radio_screen.dart

        # Chat
        echo "" | base64 -d > lib/features/chat/presentation/screens/chat_list_screen.dart
            - name: STEP 8 - Core UI, Audio & Auth
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        mkdir -p lib/features/auth/presentation/screens
        # Auth Screen
        echo "" | base64 -d > lib/features/auth/presentation/screens/simple_auth_screen.dart

        mkdir -p lib/core/services
        # Audio Service
        echo "" | base64 -d > lib/core/services/simple_audio_service.dart

        mkdir -p lib/features/player/presentation/screens
        # Full Player
        echo "" | base64 -d > lib/features/player/presentation/screens/full_player_screen.dart
            - name: STEP 9 - Inject Tabs & Main Screen (Base64)
      run: |
        cd ${{ env.FLUTTER_DIR }}
        HOME_FILE=$(find lib -name "home_tab.dart" -type f | head -n 1)
        if [ -z "$HOME_FILE" ]; then HOME_FILE="lib/features/home/presentation/screens/home_tab.dart"; mkdir -p $(dirname "$HOME_FILE"); fi
        
        # Home Tab
        echo "" | base64 -d > "$HOME_FILE"

        LIB_FILE=$(find lib -name "library_tab.dart" -type f | head -n 1)
        if [ -z "$LIB_FILE" ]; then LIB_FILE="lib/features/home/presentation/screens/library_tab.dart"; mkdir -p $(dirname "$LIB_FILE"); fi
        
        # Library Tab
        echo "" | base64 -d > "$LIB_FILE"

        PROF_FILE=$(find lib -name "profile_tab.dart" -type f | head -n 1)
        if [ -z "$PROF_FILE" ]; then PROF_FILE="lib/features/home/presentation/screens/profile_tab.dart"; mkdir -p $(dirname "$PROF_FILE"); fi
        
        # Profile Tab
        echo "" | base64 -d > "$PROF_FILE"

        MAIN_FILE=$(find lib -name "main_screen.dart" -type f | head -n 1)
        if [ -z "$MAIN_FILE" ]; then MAIN_FILE="lib/features/home/presentation/screens/main_screen.dart"; mkdir -p $(dirname "$MAIN_FILE"); fi
        
        # Main Screen
        echo "" | base64 -d > "$MAIN_FILE"

        HOME_PATH=$(echo "$HOME_FILE" | sed 's|lib/||')
        LIB_PATH=$(echo "$LIB_FILE" | sed 's|lib/||')
        PROF_PATH=$(echo "$PROF_FILE" | sed 's|lib/||')
        ADMIN_FILE=$(find lib -name "admin_screen.dart" -type f | head -n 1)
        if [ ! -z "$ADMIN_FILE" ]; then
          ADMIN_PATH=$(echo "$ADMIN_FILE"| sed 's|lib/||')
          sed -i "s|// REPLACE_ADMIN_IMPORT|import 'package:openwave/$ADMIN_PATH';|g" "$PROF_FILE"
        fi
        sed -i "s|// REPLACE_HOME_IMPORT|import 'package:openwave/$HOME_PATH';|g" "$MAIN_FILE"
        sed -i "s|// REPLACE_LIB_IMPORT|import 'package:openwave/$LIB_PATH';|g" "$MAIN_FILE"
        sed -i "s|// REPLACE_PROF_IMPORT|import 'package:openwave/$PROF_PATH';|g" "$MAIN_FILE"

    - name: STEP 10 - Root Setup & Supabase (Base64)
      run: |
        cd ${{ env.FLUTTER_DIR }}
        MAIN_FILE=$(find lib -name "main_screen.dart" -type f | head -n 1)
        MAIN_PATH=$(echo "$MAIN_FILE" | sed 's|lib/||')
        
        echo "" | base64 -d > lib/main.dart
        
        sed -i "s|// REPLACE_MAIN_IMPORT|import 'package:openwave/$MAIN_PATH';|g" lib/main.dart

    - name: STEP 11 - Build Ready APK
      run: |
        cd ${{ env.FLUTTER_DIR }}
        flutter pub get
        dart run build_runner build --delete-conflicting-outputs || true
        flutter build apk --release

    - name: STEP 12 - Final Artifact Upload
      uses: actions/upload-artifact@v4
      with:
        name: OpenWave-Final-App
        path: "**/build/app/outputs/flutter-apk/*.apk"
