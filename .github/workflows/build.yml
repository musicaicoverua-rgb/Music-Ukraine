        cat << "EOF" > lib/features/gamification/presentation/screens/spin_wheel_screen.dart
        import 'package:flutter/material.dart';
        import 'dart:math';

        class SpinWheelScreen extends StatefulWidget {
          const SpinWheelScreen({super.key});
          @override
          State<SpinWheelScreen> createState() => _SpinWheelScreenState();
        }

        class _SpinWheelScreenState extends State<SpinWheelScreen> with SingleTickerProviderStateMixin {
          late AnimationController _ctrl;
          bool _spinning = false;

          @override
          void initState() {
            super.initState();
            _ctrl = AnimationController(vsync: this, duration: const Duration(seconds: 3));
          }

          @override
          void dispose() {
            _ctrl.dispose();
            super.dispose();
          }

          void _spin() {
            if (_spinning) return;
            setState(() => _spinning = true);
            _ctrl.reset();
            _ctrl.animateTo(Random().nextDouble() * 5 + 5, curve: Curves.decelerate).then((_) {
              setState(() => _spinning = false);
              ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Ви виграли приз!')));
            });
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              backgroundColor: Colors.black,
              appBar: AppBar(
                title: const Text('Колесо Фортуни', style: TextStyle(color: Colors.white)),
                backgroundColor: Colors.black,
                iconTheme: const IconThemeData(color: Colors.white),
              ),
              body: Center(
                child: Column(
                  mainAxisAlignment: MainAxisAlignment.center,
                  children: [
                    RotationTransition(
                      turns: _ctrl,
                      child: Container(
                        width: 300,
                        height: 300,
                        decoration: BoxDecoration(
                          shape: BoxShape.circle,
                          gradient: const SweepGradient(
                            colors: [Colors.red, Colors.blue, Colors.green, Colors.yellow, Colors.red],
                          ),
                          border: Border.all(color: Colors.white, width: 5),
                        ),
                        child: const Center(
                          child: Text('КРУТИТИ', style: TextStyle(fontWeight: FontWeight.bold, fontSize: 30, color: Colors.white)),
                        ),
                      ),
                    ),
                    const SizedBox(height: 50),
                    ElevatedButton(
                      style: ElevatedButton.styleFrom(
                        backgroundColor: const Color(0xFF6C63FF),
                        padding: const EdgeInsets.symmetric(horizontal: 50, vertical: 20),
                      ),
                      onPressed: _spinning ? null : _spin,
                      child: const Text('ЗАПУСТИТИ', style: TextStyle(fontSize: 20, fontWeight: FontWeight.bold, color: Colors.white)),
                    ),
                  ],
                ),
              ),
            );
          }
        }
        EOF

        cat << "EOF" > lib/features/gamification/presentation/screens/achievements_screen.dart
