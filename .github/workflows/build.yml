                  SizedBox(width: 200, height: 50, child: ElevatedButton(style: ElevatedButton.styleFrom(backgroundColor: claimed ? Colors.grey : Colors.orange, shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(20))), onPressed: claimed ? null : () => setState(() { reward = Random().nextInt(50) + 10; claimed = true; }), child: Text(claimed ? 'Приходьте завтра' : 'ВІДКРИТИ', style: const TextStyle(color: Colors.white, fontWeight: FontWeight.bold, fontSize: 18))))
                ])));
