name: Flutter Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: 4. Unpack Source Code
        run: |
          unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
          DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          echo "FLUTTER_DIR=$DIR" >> $GITHUB_ENV

      - name: 5. Purge Broken Legacy Code
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          rm -rf lib/features/admin
          rm -rf lib/features/auth/presentation/bloc
          rm -rf lib/features/home/presentation/bloc
          rm -rf lib/features/player/presentation/bloc
          rm -rf lib/core/models
          rm -f lib/core/services/supabase_service.dart

      - name: 6. Configure Android and Pubspec
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          mkdir -p android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/values
          mkdir -p assets/images assets/animations
          
          echo "kotlin_version=1.9.0" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "flutter.compileSdkVersion=35" >> android/local.properties
          echo "flutter.minSdkVersion=24" >> android/local.properties
          
          touch assets/images/logo.png assets/images/default_cover.png
          echo "{}" > assets/animations/loading.json
          
          cat << 'EOF' > android/app/src/main/res/values/styles.xml
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="@android:style/Theme.Light.NoTitleBar"><item name="android:windowBackground">@android:color/black</item></style>
              <style name="NormalTheme" parent="@android:style/Theme.Light.NoTitleBar"><item name="android:windowBackground">@android:color/black</item></style>
          </resources>
          EOF

          # Python script для оновлення pubspec, AndroidManifest та MainActivity
          python3 - << 'EOF'
          # Твій повний python скрипт тут
          EOF

      - name: 7. Generate Core Logic
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          # Створення core/models і services
          mkdir -p lib/core/services lib/core/models
          # ... всі моделі та сервіси як раніше
          # TrackModel, PlaylistModel, SupabaseService, SimpleAudioService

      - name: 8. Generate Screens and UI
        working-directory: ${{ env.FLUTTER_DIR }}
        run: |
          # Створення папок screens і всіх UI файлів як раніше
          # auth, admin, gamification, radio, chat, player, home

      - name: 9. Get Flutter Dependencies
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter pub get

      - name: 10. Build Android Release APK
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build apk --release

      - name: 11. Build Android App Bundle (AAB)
        working-directory: ${{ env.FLUTTER_DIR }}
        run: flutter build appbundle --release

      - name: 12. Upload Build Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: OpenWave-Builds
          path: |
            ${{ env.FLUTTER_DIR }}/build/app/outputs/flutter-apk/app-release.apk
            ${{ env.FLUTTER_DIR }}/build/app/outputs/bundle/release/app-release.aab
