name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: STEP 1 - Unpack Project
        run: |
          unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
          DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          echo "FLUTTER_DIR=$DIR" >> $GITHUB_ENV

      - name: STEP 2 - Safe Dependencies Update
        run: |
          cd "${{ env.FLUTTER_DIR }}"
          flutter pub add just_audio
          flutter pub add just_audio_background
          flutter pub add supabase_flutter
          
          cat << 'EOF' >> pubspec.yaml
          
          dependency_overrides:
            web: ^0.5.0
            intl: ^0.19.0
          EOF
          
      - name: STEP 3 - Android Setup & Assets
        run: |
          cd "${{ env.FLUTTER_DIR }}"
          mkdir -p android assets/images assets/animations assets/icons assets/fonts assets/translations assets/langs
          
          echo "kotlin_version=1.9.0" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "flutter.compileSdkVersion=35" >> android/local.properties
          echo "flutter.minSdkVersion=24" >> android/local.properties
          
          touch assets/images/logo.png assets/images/default_cover.png
          echo "{}" > assets/animations/loading.json
          echo "{}" > assets/animations/success.json
          for lang in uk en es ru de fr pl cs; do echo "{}" > assets/translations/$lang.json; echo "{}" > assets/langs/$lang.json; done

      - name: STEP 4 - Safe Code Doctor
        run: |
          cd "${{ env.FLUTTER_DIR }}"
          
          cat << 'EOF' > fix_app.py
          import os, re
          def fix_drift(m):
              t = m.group(1); c = m.group(2)
              if 'Companion' in c: return "(delete(" + t + ")..where((tbl) => tbl.id.equals(" + re.search(r'id:\s*Value\((.*?)\)', c).group(1) + "))).go();"
              return "(delete(" + t + ")..where((tbl) => " + c.replace(t+'.', 'tbl.') + ")).go();"

          for r, d, fs in os.walk('lib'):
              for f in fs:
                  if not f.endswith('.dart'): continue
                  p = os.path.join(r, f)
                  with open(p, 'r', encoding='utf-8') as file: txt = file.read()
                  orig = txt
                  txt = txt.replace("json['isAdmin']", "json['is_admin']")
                  txt = txt.replace("DatabaseConnection _openConnection()", "QueryExecutor _openConnection()")
                  txt = txt.replace("DatabaseConnection openConnection()", "QueryExecutor openConnection()")
                  txt = re.sub(r'delete\(([a-zA-Z0-9_]+)\)\.delete\((.*?)\);', fix_drift, txt, flags=re.DOTALL)
                  txt = re.sub(r'native:\s*(?:const\s+)?DriftNativeOptions\s*\(.*?\)\s*,?', '', txt, flags=re.DOTALL)
                  if orig != txt:
                      with open(p, 'w', encoding='utf-8') as file: file.write(txt)
          EOF
          python3 fix_app.py
      - name: STEP 5 - Manifest & Audio Service
        run: |
          cd "${{ env.FLUTTER_DIR }}"
          
          cat << 'EOF' > fix_manifest.py
          import os
          m = "android/app/src/main/AndroidManifest.xml"
          if os.path.exists(m):
              with open(m, 'r', encoding='utf-8') as f: t = f.read()
              for p in ["INTERNET", "WAKE_LOCK", "FOREGROUND_SERVICE", "FOREGROUND_SERVICE_MEDIA_PLAYBACK"]:
                  if p not in t: t = t.replace('<application', f'    <uses-permission android:name="android.permission.{p}" />\n    <application')
              t = t.replace('android:name=".MainActivity"', 'android:name="com.ryanheise.audioservice.AudioServiceActivity"')
              if 'MediaButtonReceiver' not in t:
                  t = t.replace('</activity>', '</activity>\n        <receiver android:name="com.ryanheise.audioservice.MediaButtonReceiver" android:exported="true"><intent-filter><action android:name="android.intent.action.MEDIA_BUTTON" /></intent-filter></receiver><service android:name="com.ryanheise.audioservice.AudioService" android:foregroundServiceType="mediaPlayback" android:exported="true"><intent-filter><action android:name="android.media.browse.MediaBrowserService" /></intent-filter></service>')
              with open(m, 'w', encoding='utf-8') as f: f.write(t)
          EOF
          python3 fix_manifest.py
          
          mkdir -p lib/core/services lib/features/auth/presentation/screens
          
          cat << 'EOF' > lib/core/services/simple_audio_service.dart
          import 'package:flutter/foundation.dart'; import 'package:just_audio/just_audio.dart'; import 'package:just_audio_background/just_audio_background.dart'; import 'package:openwave/core/models/track_model.dart'; import 'package:supabase_flutter/supabase_flutter.dart';
          class SimpleAudioService {
            static final SimpleAudioService _i = SimpleAudioService._(); factory SimpleAudioService() => _i; SimpleAudioService._();
            final AudioPlayer player = AudioPlayer(); final ValueNotifier<TrackModel?> currentTrack = ValueNotifier(null);
            Future<void> playTrack(TrackModel t) async {
              currentTrack.value = t;
              try {
                String u = ''; try { u = (t as dynamic).audioUrl ?? ''; } catch (e) {}
                if (u.isEmpty) { try { u = (t as dynamic).fileUrl ?? ''; } catch (e) {} }
                if (u.isNotEmpty) {
                  if (!u.startsWith('http')) u = Supabase.instance.client.storage.from('tracks').getPublicUrl(u);
                  await player.setAudioSource(AudioSource.uri(Uri.parse(u), tag: MediaItem(id: t.id, album: 'OpenWave', title: t.title, artist: t.artist, artUri: Uri.parse('https://ui-avatars.com/api/?name=${t.title}&background=random'))));
                  player.play();
                }
              } catch (e) { debugPrint("Play error: $e"); }
            }
            void togglePlayPause() { player.playing ? player.pause() : player.play(); }
          }
          EOF

          cat << 'EOF' > lib/features/auth/presentation/screens/simple_auth_screen.dart
          import 'package:flutter/material.dart'; import 'package:supabase_flutter/supabase_flutter.dart';
