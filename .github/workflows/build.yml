               - name: STEP 8 - Core UI, AUDIO URL FIX & Auth Screen
      run: |
        cd ${{ env.FLUTTER_DIR }}
        
        # --- 1. NEW AUTH SCREEN (Login / Register) ---
        mkdir -p lib/features/auth/presentation/screens
        cat << "EOF" > lib/features/auth/presentation/screens/simple_auth_screen.dart
        import 'package:flutter/material.dart';
        import 'package:supabase_flutter/supabase_flutter.dart';

        class SimpleAuthScreen extends StatefulWidget {
          const SimpleAuthScreen({super.key});
          @override State<SimpleAuthScreen> createState() => _SimpleAuthScreenState();
        }

        class _SimpleAuthScreenState extends State<SimpleAuthScreen> {
          bool _isLogin = true;
          bool _loading = false;
          final _emailController = TextEditingController();
          final _passwordController = TextEditingController();

          Future<void> _submit() async {
            setState(() => _loading = true);
            try {
              if (_isLogin) {
                await Supabase.instance.client.auth.signInWithPassword(
                  email: _emailController.text.trim(),
                  password: _passwordController.text.trim(),
                );
              } else {
                await Supabase.instance.client.auth.signUp(
                  email: _emailController.text.trim(),
                  password: _passwordController.text.trim(),
                );
                if (mounted) ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Реєстрація успішна! Тепер увійдіть.')));
                setState(() => _isLogin = true);
              }
            } catch (e) {
              if (mounted) ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text('Помилка: ${e.toString().split('] ').last}'), backgroundColor: Colors.redAccent));
            }
            if (mounted) setState(() => _loading = false);
          }

          @override
          Widget build(BuildContext context) {
            return Scaffold(
              backgroundColor: Colors.black,
              body: Center(
                child: SingleChildScrollView(
                  padding: const EdgeInsets.all(24),
                  child: Column(
                    mainAxisAlignment: MainAxisAlignment.center,
                    children: [
                      const Icon(Icons.waves, size: 80, color: Color(0xFF6C63FF)),
                      const SizedBox(height: 20),
                      Text(_isLogin ? 'Вхід в OpenWave' : 'Створення акаунту', style: const TextStyle(fontSize: 28, fontWeight: FontWeight.bold, color: Colors.white)),
                      const SizedBox(height: 40),
                      TextField(controller: _emailController, style: const TextStyle(color: Colors.white), decoration: InputDecoration(hintText: 'Email', hintStyle: const TextStyle(color: Colors.grey), filled: true, fillColor: const Color(0xFF1E1E2C), border: OutlineInputBorder(borderRadius: BorderRadius.circular(12), borderSide: BorderSide.none))),
                      const SizedBox(height: 16),
                      TextField(controller: _passwordController, obscureText: true, style: const TextStyle(color: Colors.white), decoration: InputDecoration(hintText: 'Пароль', hintStyle: const TextStyle(color: Colors.grey), filled: true, fillColor: const Color(0xFF1E1E2C), border: OutlineInputBorder(borderRadius: BorderRadius.circular(12), borderSide: BorderSide.none))),
                      const SizedBox(height: 32),
                      SizedBox(
                        width: double.infinity,
                        height: 50,
                        child: ElevatedButton(
                          style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFF6C63FF), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12))),
                          onPressed: _loading ? null : _submit,
                          child: _loading ? const CircularProgressIndicator(color: Colors.white) : Text(_isLogin ? 'Увійти' : 'Зареєструватися', style: const TextStyle(fontSize: 16, fontWeight: FontWeight.bold, color: Colors.white)),
                        ),
                      ),
                      const SizedBox(height: 16),
                      TextButton(
                        onPressed: () => setState(() => _isLogin = !_isLogin),
                        child: Text(_isLogin ? 'Немає акаунту? Зареєструватися' : 'Вже є акаунт? Увійти', style: const TextStyle(color: Colors.grey)),
                      )
                    ],
                  ),
                ),
              ),
            );
          }
        }
        EOF

        # --- 2. AUDIO SERVICE WITH URL FIX ---
        mkdir -p lib/core/services
        cat << "EOF" > lib/core/services/simple_audio_service.dart
        import 'package:flutter/foundation.dart';
        import 'package:just_audio/just_audio.dart';
        import 'package:just_audio_background/just_audio_background.dart';
        import 'package:openwave/core/models/track_model.dart';
        import 'package:supabase_flutter/supabase_flutter.dart';

        class SimpleAudioService {
          static final SimpleAudioService _instance = SimpleAudioService._internal();
          factory SimpleAudioService() => _instance;
          SimpleAudioService._internal();
          final AudioPlayer player = AudioPlayer();
          final ValueNotifier<TrackModel?> currentTrack = ValueNotifier(null);

          Future<void> playTrack(TrackModel track) async {
            currentTrack.value = track;
            try {
              String url = '';
              try { url = (track as dynamic).audioUrl ?? ''; } catch (e) {}
              if (url.isEmpty) { try { url = (track as dynamic).fileUrl ?? ''; } catch (e) {} }
              if (url.isEmpty) { try { url = (track as dynamic).filePath ?? ''; } catch (e) {} }
              
              if (url.isNotEmpty) {
                // FIXED SOUND: Convert relative path to full public URL if needed
                if (!url.startsWith('http')) {
                  url = Supabase.instance.client.storage.from('tracks').getPublicUrl(url);
                }
                
                final audioSource = AudioSource.uri(
                  Uri.parse(url),
                  tag: MediaItem(
                    id: track.id,
                    album: 'OpenWave',
                    title: track.title,
                    artist: track.artist,
                    artUri: Uri.parse('https://ui-avatars.com/api/?name=${track.title}&background=random')
                  ),
                );
                await player.setAudioSource(audioSource);
                player.play();
              }
            } catch (e) {
              debugPrint("Playback error: $e");
            }
          }

          void togglePlayPause() {
            if (player.playing) {
              player.pause();
            } else {
              player.play();
            }
          }
        }
        EOF

        # --- 3. FULL SCREEN PLAYER ---
        mkdir -p lib/features/player/presentation/screens
        cat << "EOF" > lib/features/player/presentation/screens/full_player_screen.dart
        import 'package:flutter/material.dart';
        import 'package:openwave/core/models/track_model.dart';
        import 'package:openwave/core/services/simple_audio_service.dart';

        class FullPlayerScreen extends StatelessWidget {
          final TrackModel track;
          const FullPlayerScreen({super.key, required this.track});

          String _formatDuration(Duration? d) {
            if (d == null) return '0:00';
            String twoDigits(int n) => n.toString().padLeft(2, '0');
            return '${d.inMinutes}:${twoDigits(d.inSeconds.remainder(60))}';
          }

          @override
          Widget build(BuildContext context) {
            final player = SimpleAudioService().player;
            return Scaffold(
              backgroundColor: const Color(0xFF12121A),
              appBar: AppBar(
                backgroundColor: Colors.transparent,
                elevation: 0,
                leading: IconButton(
                  icon: const Icon(Icons.keyboard_arrow_down, color: Colors.white, size: 32),
                  onPressed: () => Navigator.pop(context),
                ),
              ),
              body: Padding(
                padding: const EdgeInsets.symmetric(horizontal: 24),
                child: Column(
                  mainAxisAlignment: MainAxisAlignment.center,
                  children: [
                    Container(
                      width: 300, height: 300,
                      decoration: BoxDecoration(
                        color: const Color(0xFF1E1E2C),
                        borderRadius: BorderRadius.circular(20),
                        boxShadow: [BoxShadow(color: const Color(0xFF6C63FF).withOpacity(0.3), blurRadius: 40, spreadRadius: 5)],
                      ),
                      child: const Icon(Icons.music_note, size: 120, color: Color(0xFF6C63FF)),
                    ),
                    const SizedBox(height: 50),
                    Text(track.title, style: const TextStyle(fontSize: 28, fontWeight: FontWeight.bold, color: Colors.white), textAlign: TextAlign.center, maxLines: 1, overflow: TextOverflow.ellipsis),
                    const SizedBox(height: 8),
                    Text(track.artist, style: const TextStyle(fontSize: 18, color: Colors.grey), textAlign: TextAlign.center, maxLines: 1, overflow: TextOverflow.ellipsis),
                    const SizedBox(height: 40),
                    StreamBuilder<Duration?>(
                      stream: player.positionStream,
                      builder: (context, posSnap) {
                        return StreamBuilder<Duration?>(
                          stream: player.durationStream,
                          builder: (context, durSnap) {
                            final pos = posSnap.data ?? Duration.zero;
                            final dur = durSnap.data ?? Duration.zero;
                            double sliderValue = pos.inSeconds.toDouble();
                            double sliderMax = dur.inSeconds.toDouble();
                            if (sliderValue > sliderMax) sliderValue = sliderMax;
                            
                            return Column(
                              children: [
                                SliderTheme(
                                  data: SliderThemeData(
                                    trackHeight: 4,
                                    thumbShape: const RoundSliderThumbShape(enabledThumbRadius: 6),
                                    activeTrackColor: const Color(0xFF6C63FF),
                                    inactiveTrackColor: Colors.grey[800],
                                    thumbColor: Colors.white,
                                  ),
                                  child: Slider(
                                    value: sliderMax > 0 ? sliderValue : 0,
                                    max: sliderMax > 0 ? sliderMax : 1,
                                    onChanged: (v) => player.seek(Duration(seconds: v.toInt())),
                                  ),
                                ),
                                Row(
                                  mainAxisAlignment: MainAxisAlignment.spaceBetween,
                                  children: [
                                    Text(_formatDuration(pos), style: const TextStyle(color: Colors.grey, fontSize: 12)),
                                    Text(_formatDuration(dur), style: const TextStyle(color: Colors.grey, fontSize: 12)),
                                  ],
                                ),
                              ],
                            );
                          },
                        );
                      }
                    ),
                    const SizedBox(height: 20),
                    Row(
                      mainAxisAlignment: MainAxisAlignment.spaceEvenly,
                      children: [
                        IconButton(icon: const Icon(Icons.skip_previous, color: Colors.white, size: 40), onPressed: () {}),
                        StreamBuilder<bool>(
                          stream: player.playingStream,
                          builder: (context, snapshot) {
                            final isPlaying = snapshot.data ?? false;
                            return Container(
                              decoration: const BoxDecoration(shape: BoxShape.circle, color: Color(0xFF6C63FF)),
                              child: IconButton(
                                icon: Icon(isPlaying ? Icons.pause : Icons.play_arrow, color: Colors.white, size: 50),
                                onPressed: () => SimpleAudioService().togglePlayPause(),
                              ),
                            );
                          },
                        ),
                        IconButton(icon: const Icon(Icons.skip_next, color: Colors.white, size: 40), onPressed: () {}),
                      ],
                    ),
                    const SizedBox(height: 40),
                  ],
                ),
              ),
            );
          }
        }
