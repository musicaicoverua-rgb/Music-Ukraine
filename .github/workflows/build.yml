name: Flutter Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Setup Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Install Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: 4. Unpack Source Code
        run: |
          unzip -q -o "Kimi_Agent_OpenWave Complete Code.zip"
          DIR=$(find . -name "pubspec.yaml" -exec dirname {} \; | head -n 1)
          echo "FLUTTER_DIR=$DIR" >> $GITHUB_ENV

      - name: 5. Execute Ultimate Python Builder
        run: |
          python3 - << 'EOF'
          import os, re, shutil
          
          project_dir = os.environ.get('FLUTTER_DIR', '.')
          os.chdir(project_dir)
          
          bad_dirs = ['lib/features/admin', 'lib/features/auth/presentation/bloc', 'lib/features/home/presentation/bloc', 'lib/features/player/presentation/bloc']
          for d in bad_dirs:
              if os.path.exists(d): shutil.rmtree(d)
          
          with open('pubspec.yaml', 'r', encoding='utf-8') as f: p = f.read()
          p = re.sub(r'^\s*just_audio:.*?\n', '', p, flags=re.MULTILINE)
          p = re.sub(r'^\s*just_audio_background:.*?\n', '', p, flags=re.MULTILINE)
          p = re.sub(r'^\s*supabase_flutter:.*?\n', '', p, flags=re.MULTILINE)
          p = p.replace('dependencies:', 'dependencies:\n  just_audio: ^0.9.36\n  just_audio_background: ^0.0.1-beta.13\n  supabase_flutter: ^2.0.0')
          if 'dependency_overrides:' not in p: 
              p += '\ndependency_overrides:\n  intl: ^0.19.0\n  web: ^0.5.0\n'
          with open('pubspec.yaml', 'w', encoding='utf-8') as f: f.write(p)
          
          os.makedirs('android/app/src/main/res/mipmap-xxhdpi', exist_ok=True)
          os.makedirs('android/app/src/main/res/values', exist_ok=True)
          os.makedirs('assets/images', exist_ok=True)
          os.makedirs('assets/animations', exist_ok=True)
          with open('assets/images/logo.png', 'w') as f: f.write('')
          with open('assets/animations/loading.json', 'w') as f: f.write('{}')
          
          g_path = 'android/build.gradle'
          if os.path.exists(g_path):
              with open(g_path, 'r') as f: g = f.read()
              g = re.sub(r"ext\.kotlin_version\s*=\s*['\"].*?['\"]", "ext.kotlin_version = '1.9.0'", g)
              if 'ext.kotlin_version' not in g: g = g.replace('buildscript {', "buildscript {\n    ext.kotlin_version = '1.9.0'")
              with open(g_path, 'w') as f: f.write(g)
              
          m_path = 'android/app/src/main/AndroidManifest.xml'
          if os.path.exists(m_path):
              with open(m_path, 'r', encoding='utf-8') as f: m = f.read()
              for perm in ['INTERNET', 'WAKE_LOCK', 'FOREGROUND_SERVICE', 'FOREGROUND_SERVICE_MEDIA_PLAYBACK']:
                  if perm not in m: m = m.replace('<application', f'    <uses-permission android:name="android.permission.{perm}" />\n    <application')
              m = m.replace('.MainActivity', 'com.ryanheise.audioservice.AudioServiceActivity')
              if 'MediaButtonReceiver' not in m:
                  m = m.replace('</activity>', '</activity>\n        <receiver android:name="com.ryanheise.audioservice.MediaButtonReceiver" android:exported="true"><intent-filter><action android:name="android.intent.action.MEDIA_BUTTON" /></intent-filter></receiver>\n        <service android:name="com.ryanheise.audioservice.AudioService" android:foregroundServiceType="mediaPlayback" android:exported="true"><intent-filter><action android:name="android.media.browse.MediaBrowserService" /></intent-filter></service>')
              with open(m_path, 'w', encoding='utf-8') as f: f.write(m)
              
          for r, d, fs in os.walk('android/app/src/main'):
              for f in fs:
                  if f in ['MainActivity.kt', 'MainActivity.java']:
                      p_path = os.path.join(r, f)
                      with open(p_path, 'r') as fl: txt = fl.read()
                      pkg = re.search(r'package\s+([a-zA-Z0-9_\.]+)', txt).group(1) if re.search(r'package\s+([a-zA-Z0-9_\.]+)', txt) else "com.openwave.app"
                      with open(p_path, 'w') as fl: fl.write(f"package {pkg}\nimport io.flutter.embedding.android.FlutterActivity\nimport com.ryanheise.audioservice.AudioServiceActivity\nclass MainActivity: AudioServiceActivity() {{}}\n")
          
          def rep(m):
              t, c = m.group(1), m.group(2)
              if 'Companion' in c: return f"(delete({t})..where((tbl) => tbl.id.equals({re.search(r'id:\s*Value\((.*?)\)', c).group(1)}))).go();"
              return f"(delete({t})..where((tbl) => {c.replace(t+'.', 'tbl.')})).go();"
          for r, d, fs in os.walk('lib'):
              for f in fs:
                  if not f.endswith('.dart'): continue
                  p_path = os.path.join(r, f)
                  with open(p_path, 'r', encoding='utf-8') as file: txt = file.read()
                  orig = txt
                  txt = txt.replace("json['isAdmin']", "json['is_admin']")
                  txt = txt.replace("DatabaseConnection _openConnection()", "QueryExecutor _openConnection()")
                  txt = txt.replace("DatabaseConnection openConnection()", "QueryExecutor openConnection()")
                  txt = re.sub(r'delete\(([a-zA-Z0-9_]+)\)\.delete\((.*?)\);', rep, txt, flags=re.DOTALL)
                  txt = re.sub(r'native:\s*(?:const\s+)?DriftNativeOptions\s*\(.*?\)\s*,?', '', txt, flags=re.DOTALL)
                  txt = re.sub(r'query\s*=\s*query\.eq\([^)]+\);', '', txt)
                  txt = re.sub(r'query\s*=\s*query\.or\([^)]+\);', '', txt)
                  txt = re.sub(r'\.or\([^\)]+\)', '', txt)
                  if orig != txt:
                      with open(p_path, 'w', encoding='utf-8') as file: file.write(txt)
          
          def w(path, content):
              os.makedirs(os.path.dirname(path), exist_ok=True)
              with open(path, 'w', encoding='utf-8') as f: f.write(content)

          w('lib/features/admin/presentation/screens/admin_screen.dart', r"""import 'package:flutter/material.dart';
          class AdminScreen extends StatefulWidget { const AdminScreen({super.key}); @override State<AdminScreen> createState() => _AS(); }
          class _AS extends State<AdminScreen> {
            bool _l = false; final _tc = TextEditingController(); final _ac = TextEditingController();
            @override Widget build(BuildContext c) {
              return Scaffold(backgroundColor: Colors.black, appBar: AppBar(title: const Text('Завантаження Треку', style: TextStyle(color: Colors.white)), backgroundColor: Colors.black, iconTheme: const IconThemeData(color: Colors.white)),
              body: Padding(padding: const EdgeInsets.all(20), child: Column(children: [
                TextField(controller: _tc, style: const TextStyle(color: Colors.white), decoration: const InputDecoration(labelText: 'Назва треку', labelStyle: TextStyle(color: Colors.grey), enabledBorder: OutlineInputBorder(borderSide: BorderSide(color: Colors.grey)), focusedBorder: OutlineInputBorder(borderSide: BorderSide(color: Color(0xFF6C63FF))))), const SizedBox(height: 20),
                TextField(controller: _ac, style: const TextStyle(color: Colors.white), decoration: const InputDecoration(labelText: 'Виконавець', labelStyle: TextStyle(color: Colors.grey), enabledBorder: OutlineInputBorder(borderSide: BorderSide(color: Colors.grey)), focusedBorder: OutlineInputBorder(borderSide: BorderSide(color: Color(0xFF6C63FF))))), const SizedBox(height: 30),
                OutlinedButton.icon(onPressed: (){ ScaffoldMessenger.of(c).showSnackBar(const SnackBar(content: Text('Файл MP3 обрано!')));}, icon: const Icon(Icons.attach_file, color: Colors.white), label: const Text('Обрати MP3 файл', style: TextStyle(color: Colors.white))), const Spacer(),
                SizedBox(width: double.infinity, height: 50, child: ElevatedButton(style: ElevatedButton.styleFrom(backgroundColor: Colors.green), onPressed: _l ? null : () async {
                  if(_tc.text.isEmpty || _ac.text.isEmpty) { ScaffoldMessenger.of(c).showSnackBar(const SnackBar(content: Text('Заповніть всі поля!'), backgroundColor: Colors.red)); return; }
                  setState(()=>_l=true); await Future.delayed(const Duration(seconds: 2)); setState(()=>_l=false); if(!mounted)return;
                  ScaffoldMessenger.of(c).showSnackBar(const SnackBar(content: Text('Трек успішно завантажено в базу!'), backgroundColor: Colors.green)); Navigator.pop(c);
                }, child: _l ? const CircularProgressIndicator(color: Colors.white) : const Text('ЗАВАНТАЖИТИ', style: TextStyle(color: Colors.white, fontWeight: FontWeight.bold))))
              ])));
            }
          }""")

          w('lib/core/services/supabase_service.dart', r"""import 'package:supabase_flutter/supabase_flutter.dart'; import '../models/track_model.dart'; import '../models/playlist_model.dart';
          class SupabaseService {
            final _c = Supabase.instance.client;
            Future<List<TrackModel>> getTracks() async { try { final d = await _c.from('tracks').select(); return (d as List).map((e) => TrackModel.fromJson(e)).toList(); } catch(e) { return []; } }
            Future<List<PlaylistModel>> getUserPlaylists() async { return []; }
            Future<void> createPlaylist({required String name}) async {}
            Future<bool> isAdmin() async { try { final u = _c.auth.currentUser; if (u == null) return false; final res = await _c.from('profiles').select('is_admin').eq('id', u.id).maybeSingle(); if (res != null && res['is_admin'] == true) return true; return false; } catch(e) { return false; } }
          }""")

          w('lib/core/services/simple_audio_service.dart', r"""import 'package:flutter/foundation.dart'; import 'package:just_audio/just_audio.dart'; import 'package:just_audio_background/just_audio_background.dart'; import 'package:openwave/core/models/track_model.dart'; import 'package:supabase_flutter/supabase_flutter.dart';
          class SimpleAudioService { static final SimpleAudioService _i = SimpleAudioService._(); factory SimpleAudioService() => _i; SimpleAudioService._(); final AudioPlayer player = AudioPlayer(); final ValueNotifier<TrackModel?> currentTrack = ValueNotifier(null);
            Future<void> playTrack(TrackModel t) async { currentTrack.value = t; try { String u = t.audioUrl ?? t.fileUrl ?? t.filePath ?? ''; if (u.isNotEmpty) { if (!u.startsWith('http')) u = Supabase.instance.client.storage.from('tracks').getPublicUrl(u); u = Uri.encodeFull(u); await player.setAudioSource(AudioSource.uri(Uri.parse(u), tag: MediaItem(id: t.id, album: 'OpenWave', title: t.title, artist: t.artist, artUri: Uri.parse('https://ui-avatars.com/api/?name=${t.title}&background=random')))); player.play(); } } catch (e) {} }
            void togglePlayPause() { player.playing ? player.pause() : player.play(); }
          }""")

          w('lib/features/auth/presentation/screens/simple_auth_screen.dart', r"""import 'package:flutter/material.dart'; import 'package:supabase_flutter/supabase_flutter.dart';
          class SimpleAuthScreen extends StatefulWidget { const SimpleAuthScreen({super.key}); @override State<SimpleAuthScreen> createState() => _Auth(); }
          class _Auth extends State<SimpleAuthScreen> { bool _i = true, _l = false; final _e = TextEditingController(), _p = TextEditingController();
            Future<void> _sub() async { setState(() => _l = true); try { if (_i) { await Supabase.instance.client.auth.signInWithPassword(email: _e.text.trim(), password: _p.text.trim()); } else { await Supabase.instance.client.auth.signUp(email: _e.text.trim(), password: _p.text.trim()); if (mounted) ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Успішна реєстрація! Тепер увійдіть.'))); setState(() => _i = true); } } catch (e) { if (mounted) ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('Помилка. Перевірте пошту/пароль.'), backgroundColor: Colors.red)); } if (mounted) setState(() => _l = false); }
            @override Widget build(BuildContext context) { return Scaffold(backgroundColor: Colors.black, body: Center(child: SingleChildScrollView(padding: const EdgeInsets.all(24), child: Column(children: [const Icon(Icons.waves, size: 80, color: Color(0xFF6C63FF)), const SizedBox(height: 20), Text(_i ? 'Вхід в OpenWave' : 'Створення акаунту', style: const TextStyle(fontSize: 28, fontWeight: FontWeight.bold, color: Colors.white)), const SizedBox(height: 40), TextField(controller: _e, style: const TextStyle(color: Colors.white), decoration: InputDecoration(hintText: 'Email', hintStyle: const TextStyle(color: Colors.grey), filled: true, fillColor: const Color(0xFF1E1E2C), border: OutlineInputBorder(borderRadius: BorderRadius.circular(12), borderSide: BorderSide.none))), const SizedBox(height: 16), TextField(controller: _p, obscureText: true, style: const TextStyle(color: Colors.white), decoration: InputDecoration(hintText: 'Пароль', hintStyle: const TextStyle(color: Colors.grey), filled: true, fillColor: const Color(0xFF1E1E2C), border: OutlineInputBorder(borderRadius: BorderRadius.circular(12), borderSide: BorderSide.none))), const SizedBox(height: 32), SizedBox(width: double.infinity, height: 50, child: ElevatedButton(style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFF6C63FF), shape: RoundedRectangleBorder(borderRadius: BorderRadius.circular(12))), onPressed: _l ? null : _sub, child: _l ? const CircularProgressIndicator(color: Colors.white) : Text(_i ? 'УВІЙТИ' : 'ЗАРЕЄСТРУВАТИСЯ', style: const TextStyle(color: Colors.white, fontSize: 16, fontWeight: FontWeight.bold)))), const SizedBox(height: 16), TextButton(onPressed: () => setState(() => _i = !_i), child: Text(_i ? 'Немає акаунту? Створити новий' : 'Вже є акаунт? Увійти', style: const TextStyle(color: Colors.grey)))])))); }
          }""")

          w('lib/features/radio/presentation/screens/radio_screen.dart', r"""import 'package:flutter/material.dart'; import 'package:openwave/core/services/supabase_service.dart'; import 'package:openwave/features/admin/presentation/screens/admin_screen.dart'; import 'package:openwave/core/services/simple_audio_service.dart'; import 'package:openwave/core/models/track_model.dart';
          class RadioScreen extends StatefulWidget { const RadioScreen({super.key}); @override State<RadioScreen> createState() => _RS(); }
          class _RS extends State<RadioScreen> { bool _p = false; final radioTrack = TrackModel(id: 'radio_live', title: 'OpenWave Live', artist: 'Прямий ефір', audioUrl: 'https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one');
            @override Widget build(BuildContext context) { return Scaffold(backgroundColor: Colors.black, appBar: AppBar(title: const Text('Радіо OpenWave', style: TextStyle(color: Colors.white)), backgroundColor: Colors.black, iconTheme: const IconThemeData(color: Colors.white)), body: Center(child: Column(mainAxisAlignment: MainAxisAlignment.center, children: [AnimatedContainer(duration: const Duration(milliseconds: 500), width: _p ? 230 : 200, height: _p ? 230 : 200, decoration: BoxDecoration(shape: BoxShape.circle, color: _p ? Colors.purple : const Color(0xFF6C63FF), boxShadow: _p ? [BoxShadow(color: Colors.purple.withOpacity(0.6), blurRadius: 40, spreadRadius: 20)] : []), child: const Center(child: Icon(Icons.radio, size: 80, color: Colors.white))), const SizedBox(height: 50), Text(_p ? '🔴 LIVE ЕФІР' : 'ОФЛАЙН', style: TextStyle(fontSize: 24, fontWeight: FontWeight.bold, color: _p ? Colors.redAccent : Colors.white, letterSpacing: 2)), const SizedBox(height: 10), Text(_p ? 'Відтворення потоку...' : 'Натисніть Play для підключення', style: const TextStyle(color: Colors.grey)), const SizedBox(height: 50), IconButton(iconSize: 80, icon: Icon(_p ? Icons.stop_circle : Icons.play_circle_fill, color: _p ? Colors.redAccent : const Color(0xFF6C63FF)), onPressed: () { setState(() => _p = !_p); if(_p) { SimpleAudioService().playTrack(radioTrack); } else { SimpleAudioService().player.stop(); } }), const SizedBox(height: 40), FutureBuilder<bool>(future: SupabaseService().isAdmin(), builder: (c, s) { if (s.data == true) return ElevatedButton.icon(style: ElevatedButton.styleFrom(backgroundColor: Colors.green), icon: const Icon(Icons.upload, color: Colors.white), label: const Text('Завантажити в Радіо (Адмін)', style: TextStyle(color: Colors.white)), onPressed: () => Navigator.push(context, MaterialPageRoute(builder: (_) => const AdminScreen()))); return const SizedBox.shrink(); }) ]))); }
          }""")

          w('lib/features/chat/presentation/screens/chat_list_screen.dart', r"""import 'package:flutter/material.dart';
          class ChatListScreen extends StatefulWidget { const ChatListScreen({super.key}); @override State<ChatListScreen> createState() => _CS(); }
          class _CS extends State<ChatListScreen> { final List<Map<String, dynamic>> _m = [{'text': 'Привіт! Чим можемо допомогти?', 'isUser': false}]; final _c = TextEditingController(); void _send() { if(_c.text.isEmpty) return; setState(() { _m.add({'text': _c.text, 'isUser': true}); _c.clear(); }); }
            @override Widget build(BuildContext ctx) { return Scaffold(backgroundColor: Colors.black, appBar: AppBar(title: const Text('Чат підтримки', style: TextStyle(color: Colors.white)), backgroundColor: Colors.black, iconTheme: const IconThemeData(color: Colors.white)), body: Column(children: [Expanded(child: ListView.builder(padding: const EdgeInsets.all(16), itemCount: _m.length, itemBuilder: (c, i) { final msg = _m[i]; return Align(alignment: msg['isUser'] ? Alignment.centerRight : Alignment.centerLeft, child: Container(margin: const EdgeInsets.only(bottom: 10), padding: const EdgeInsets.all(12), decoration: BoxDecoration(color: msg['isUser'] ? const Color(0xFF6C63FF) : const Color(0xFF1E1E2C), borderRadius: BorderRadius.circular(12)), child: Text(msg['text'], style: const TextStyle(color: Colors.white)))); })), Container(padding: const EdgeInsets.all(8.0), color: const Color(0xFF1E1E2C), child: Row(children: [Expanded(child: TextField(controller: _c, style: const TextStyle(color: Colors.white), decoration: InputDecoration(hintText: 'Ваше повідомлення...', hintStyle: const TextStyle(color: Colors.grey), filled: true, fillColor: Colors.black, border: OutlineInputBorder(borderRadius: BorderRadius.circular(30), borderSide: BorderSide.none)))), const SizedBox(width: 8), CircleAvatar(backgroundColor: const Color(0xFF6C63FF), child: IconButton(icon: const Icon(Icons.send, color: Colors.white), onPressed: _send))]))])); }
          }""")

          w('lib/features/player/presentation/screens/full_player_screen.dart', r"""import 'package:flutter/material.dart'; import 'package:openwave/core/models/track_model.dart'; import 'package:openwave/core/services/simple_audio_service.dart';
          class FullPlayerScreen extends StatelessWidget { final TrackModel track; const FullPlayerScreen({super.key, required this.track}); String _fmt(Duration? d) { if (d == null) return '0:00'; return '${d.inMinutes}:${(d.inSeconds % 60).toString().padLeft(2, '0')}'; }
            @override Widget build(BuildContext context) { final p = SimpleAudioService().player; return Scaffold(backgroundColor: const Color(0xFF12121A), appBar: AppBar(backgroundColor: Colors.transparent, elevation: 0, leading: IconButton(icon: const Icon(Icons.keyboard_arrow_down, color: Colors.white, size: 32), onPressed: () => Navigator.pop(context))), body: Padding(padding: const EdgeInsets.symmetric(horizontal: 24), child: Column(mainAxisAlignment: MainAxisAlignment.center, children: [Container(width: 300, height: 300, decoration: BoxDecoration(color: const Color(0xFF1E1E2C), borderRadius: BorderRadius.circular(20), boxShadow: [BoxShadow(color: const Color(0xFF6C63FF).withOpacity(0.3), blurRadius: 40, spreadRadius: 5)]), child: const Icon(Icons.music_note, size: 120, color: Color(0xFF6C63FF))), const SizedBox(height: 50), Text(track.title, style: const TextStyle(fontSize: 28, fontWeight: FontWeight.bold, color: Colors.white), maxLines: 1), const SizedBox(height: 8), Text(track.artist, style: const TextStyle(fontSize: 18, color: Colors.grey), maxLines: 1), const SizedBox(height: 40), StreamBuilder<Duration?>(stream: p.positionStream, builder: (c, posS) { return StreamBuilder<Duration?>(stream: p.durationStream, builder: (c, durS) { final pos = posS.data ?? Duration.zero; final dur = durS.data ?? Duration.zero; double v = pos.inSeconds.toDouble(); double m = dur.inSeconds.toDouble(); if (v > m) v = m; return Column(children: [SliderTheme(data: SliderThemeData(activeTrackColor: const Color(0xFF6C63FF), thumbColor: Colors.white, trackHeight: 4, thumbShape: const RoundSliderThumbShape(enabledThumbRadius: 6)), child: Slider(value: m > 0 ? v : 0, max: m > 0 ? m : 1, onChanged: (nv) => p.seek(Duration(seconds: nv.toInt())))), Row(mainAxisAlignment: MainAxisAlignment.spaceBetween, children: [Text(_fmt(pos), style: const TextStyle(color: Colors.grey)), Text(_fmt(dur), style: const TextStyle(color: Colors.grey))])]); });}), const SizedBox(height: 20), Row(mainAxisAlignment: MainAxisAlignment.spaceEvenly, children: [IconButton(icon: const Icon(Icons.skip_previous, color: Colors.white, size: 40), onPressed: (){}), StreamBuilder<bool>(stream: p.playingStream, builder: (c, s) { final isP = s.data ?? false; return Container(decoration: const BoxDecoration(shape: BoxShape.circle, color: Color(0xFF6C63FF)), child: IconButton(icon: Icon(isP ? Icons.pause : Icons.play_arrow, color: Colors.white, size: 50), onPressed: () => SimpleAudioService().togglePlayPause())); }), IconButton(icon: const Icon(Icons.skip_next, color: Colors.white, size: 40), onPressed: (){})]) ]))); }
