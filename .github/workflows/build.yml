import 'dart:io';
import 'package:flutter/material.dart';
import 'package:just_audio/just_audio.dart';
import 'package:just_audio_background/just_audio_background.dart';
import 'package:supabase_flutter/supabase_flutter.dart';
import 'package:file_picker/file_picker.dart';

/// =======================
/// MODEL TRACK
/// =======================

class TrackModel {

  final String id;
  final String title;
  final String artist;
  final String audioUrl;

  bool liked;

  TrackModel({
    required this.id,
    required this.title,
    required this.artist,
    required this.audioUrl,
    this.liked = false
  });

  factory TrackModel.fromJson(Map<String,dynamic> json){

    return TrackModel(
      id: json["id"].toString(),
      title: json["title"] ?? "",
      artist: json["artist"] ?? "",
      audioUrl: json["audioUrl"] ?? "",
    );

  }

}

/// =======================
/// SUPABASE SERVICE
/// =======================

class SupabaseService {

  final client = Supabase.instance.client;

  /// GET TRACKS

  Future<List<TrackModel>> getTracks() async {

    final res = await client
        .from("tracks")
        .select()
        .order("created_at");

    return (res as List)
        .map((e)=>TrackModel.fromJson(e))
        .toList();

  }

  /// ADMIN CHECK

  Future<bool> isAdmin() async {

    final user = client.auth.currentUser;

    if(user == null) return false;

    final data = await client
        .from("profiles")
        .select("is_admin")
        .eq("id", user.id)
        .maybeSingle();

    return data?["is_admin"] == true;

  }

  /// UPLOAD TRACK

  Future<void> uploadTrack({
    required String title,
    required String artist
  }) async {

    final result = await FilePicker.platform.pickFiles(
      type: FileType.audio
    );

    if(result == null) return;

    final file = result.files.single;

    final path =
        "tracks/${DateTime.now().millisecondsSinceEpoch}_${file.name}";

    await client.storage
        .from("tracks")
        .uploadBinary(path, file.bytes!);

    final url = client.storage
        .from("tracks")
        .getPublicUrl(path);

    await client.from("tracks").insert({

      "title":title,
      "artist":artist,
      "audioUrl":url

    });

  }

  /// LIKE TRACK

  Future<void> likeTrack(String trackId) async {

    final user = client.auth.currentUser;

    if(user == null) return;

    await client.from("likes").insert({

      "user_id":user.id,
      "track_id":trackId

    });

  }

  /// PLAYLIST CREATE

  Future<void> createPlaylist(String name) async {

    final user = client.auth.currentUser;

    if(user == null) return;

    await client.from("playlists").insert({

      "user_id":user.id,
      "name":name

    });

  }

}

/// =======================
/// AUDIO SERVICE
/// =======================

class AudioService {

  static final AudioService _instance =
      AudioService._internal();

  factory AudioService()=>_instance;

  AudioService._internal();

  final player = AudioPlayer();

  final ValueNotifier<TrackModel?> currentTrack =
      ValueNotifier(null);

  /// PLAY TRACK

  Future<void> playTrack(TrackModel track) async {

    currentTrack.value = track;

    await player.setAudioSource(

      AudioSource.uri(
        Uri.parse(track.audioUrl),

        tag: MediaItem(
          id: track.id,
          album: "OpenWave",
          title: track.title,
          artist: track.artist
        ),

      ),

    );

    player.play();

  }

  /// PLAY RADIO

  Future<void> playRadio() async {

    await player.setUrl(
      "https://stream.live.vc.bbcmedia.co.uk/bbc_radio_one"
    );

    player.play();

  }

  void pause(){

    player.pause();

  }

}

/// =======================
/// ADMIN PANEL
/// =======================

class AdminUploadButton extends StatelessWidget {

  final TextEditingController titleCtrl;
  final TextEditingController artistCtrl;

  const AdminUploadButton({
    super.key,
    required this.titleCtrl,
    required this.artistCtrl
  });

  @override
  Widget build(BuildContext context) {

    return FutureBuilder<bool>(

      future: SupabaseService().isAdmin(),

      builder:(context,snapshot){

        if(snapshot.data != true){
          return SizedBox();
        }

        return ElevatedButton.icon(

          icon: Icon(Icons.upload),

          label: Text("Upload Track (Admin)"),

          onPressed: () async {

            await SupabaseService().uploadTrack(

              title:titleCtrl.text,
              artist:artistCtrl.text

            );

            ScaffoldMessenger.of(context).showSnackBar(

              SnackBar(
                content: Text("Track uploaded")
              )

            );

          },

        );

      },

    );

  }

}

/// =======================
/// RADIO PLAYER
/// =======================

class RadioPlayer extends StatefulWidget {

  const RadioPlayer({super.key});

  @override
  State<RadioPlayer> createState()=>_RadioState();

}

class _RadioState extends State<RadioPlayer>{

  bool playing=false;

  @override
  Widget build(BuildContext context){

    return Column(

      children:[

        IconButton(

          iconSize:80,

          icon:Icon(

            playing
                ? Icons.pause_circle
                : Icons.play_circle,

            color:Colors.purple,

          ),

          onPressed:() async{

            if(playing){

              AudioService().pause();

            }else{

              await AudioService().playRadio();

            }

            setState(() {
              playing=!playing;
            });

          },

        ),

      ],

    );

  }

}

/// =======================
/// LIKE BUTTON
/// =======================

class LikeButton extends StatefulWidget {

  final TrackModel track;

  const LikeButton({super.key,required this.track});

  @override
  State<LikeButton> createState()=>_LikeState();

}

class _LikeState extends State<LikeButton>{

  bool liked=false;

  @override
  Widget build(BuildContext context){

    return IconButton(

      icon:Icon(
        liked
            ? Icons.favorite
            : Icons.favorite_border,
        color:Colors.red
      ),

      onPressed:() async{

        await SupabaseService()
            .likeTrack(widget.track.id);

        setState(() {
          liked=true;
        });

      },

    );

  }

}
