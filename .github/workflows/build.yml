          cat << 'EOF' > lib/features/gamification/presentation/screens/spin_wheel_screen.dart
          import 'package:flutter/material.dart';
          import 'dart:math';
          class SpinWheelScreen extends StatefulWidget { const SpinWheelScreen({super.key}); @override State<SpinWheelScreen> createState() => _SpinState(); }
          class _SpinState extends State<SpinWheelScreen> with SingleTickerProviderStateMixin {
            late AnimationController ctrl; bool spinning = false;
            @override void initState() { super.initState(); ctrl = AnimationController(vsync: this, duration: const Duration(seconds: 4)); }
            @override void dispose() { ctrl.dispose(); super.dispose(); }
            @override Widget build(BuildContext context) {
              return Scaffold(backgroundColor: Colors.black, appBar: AppBar(title: const Text('Колесо Фортуни', style: TextStyle(color: Colors.white)), backgroundColor: Colors.black, iconTheme: const IconThemeData(color: Colors.white)),
